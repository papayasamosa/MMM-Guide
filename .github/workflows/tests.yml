name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ancestry-mmm-tests:
    name: ancestry-mmm-tests-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked

      - name: Assert pinned PyMC Marketing compatibility
        env:
          EXPECTED_PYMC_MARKETING: ${{ matrix.python-version == '3.11' && '0.19.2' || '0.19.4' }}
        run: |
          uv run python -c "import os, pymc_marketing; assert pymc_marketing.__version__ == os.environ['EXPECTED_PYMC_MARKETING'], (pymc_marketing.__version__, os.environ['EXPECTED_PYMC_MARKETING'])"
          uv run pytest ancestry_mmm/tests/test_transformations.py -k pymc_marketing -v

      - name: Run tests
        run: uv run pytest ancestry_mmm/tests/ -q

      - name: Run ruff
        run: uv run ruff check ancestry_mmm

      - name: Streamlit smoke tests (AppTest, every page)
        run: uv run pytest ancestry_mmm/tests/test_streamlit_smoke.py -v

      - name: Bundle round-trip tests (export/import/reconstruct/approval)
        run: uv run pytest ancestry_mmm/tests/test_persistence.py -v
