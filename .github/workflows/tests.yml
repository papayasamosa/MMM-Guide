name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ancestry-mmm-tests:
    name: ancestry-mmm-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest ancestry_mmm/tests/ -q

      - name: Run ruff
        run: uv run ruff check ancestry_mmm

      - name: Streamlit smoke tests (AppTest, every page)
        run: uv run pytest ancestry_mmm/tests/test_streamlit_smoke.py -v

      - name: Bundle round-trip tests (export/import/reconstruct/approval)
        run: uv run pytest ancestry_mmm/tests/test_persistence.py -v
